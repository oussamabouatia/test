<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GéoCollège — Figures Animées</title>
<style>
  :root {
    --green:   #16a34a;
    --green-d: #14532d;
    --green-l: #dcfce7;
    --green-m: #bbf7d0;
    --bg:      #f8fafc;
    --surface: #ffffff;
    --border:  #e2e8f0;
    --text:    #0f172a;
    --muted:   #64748b;
    --radius:  16px;
    --shadow:  0 4px 24px rgba(0,0,0,0.08);
    --blue:    #3b82f6;
    --yellow:  #f59e0b;
    --red:     #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--green-d);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header .logo {
    width: 42px; height: 42px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  header h1 { color: #fff; font-size: 1.4rem; font-weight: 700; }
  header span { color: #86efac; font-size: 0.85rem; margin-left: auto; }

  /* ─── FILTERS ─── */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters-bar label { font-size: 0.8rem; color: var(--muted); font-weight: 600; margin-right: 4px; }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--green); color: var(--green); }
  .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }
  .filter-btn.niveau-1ac.active { background: var(--blue); border-color: var(--blue); }
  .filter-btn.niveau-2ac.active { background: var(--yellow); border-color: var(--yellow); }

  /* ─── MAIN GRID ─── */
  .main {
    padding: 28px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 22px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform .25s, box-shadow .25s, border-color .25s;
    cursor: pointer;
    animation: fadeIn .4s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.13);
    border-color: var(--green);
  }
  .card.hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-badge {
    padding: 4px 10px 0;
    display: flex;
    gap: 6px;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-1ac { background: #dbeafe; color: #1d4ed8; }
  .badge-2ac { background: #fef3c7; color: #92400e; }
  .badge-cat { background: var(--green-l); color: var(--green-d); }

  /* ─── SVG AREA ─── */
  .svg-area {
    padding: 16px 20px 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 150px;
    position: relative;
  }
  .svg-area svg {
    width: 100%;
    max-width: 200px;
    height: 140px;
    overflow: visible;
  }

  /* SVG animation classes */
  .geo-shape {
    fill: var(--green-l);
    stroke: var(--green);
    stroke-width: 2.5;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    transition: fill .3s;
  }
  .card:hover .geo-shape {
    fill: #bbf7d0;
    animation: drawShape 1s ease forwards, pulseFill 2s ease 1s infinite alternate;
  }
  @keyframes drawShape {
    to { stroke-dashoffset: 0; }
  }
  @keyframes pulseFill {
    from { fill: #bbf7d0; }
    to   { fill: #dcfce7; }
  }

  /* Right angle marker */
  .right-angle {
    fill: none;
    stroke: var(--green-d);
    stroke-width: 1.8;
    opacity: 0;
    transition: opacity .4s .6s;
  }
  .card:hover .right-angle { opacity: 1; }

  /* dimension labels */
  .dim-label {
    font-size: 11px;
    fill: var(--green-d);
    font-weight: 700;
    opacity: 0;
    transition: opacity .4s .5s;
  }
  .card:hover .dim-label { opacity: 1; }

  /* angle arc */
  .angle-arc {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 1.5;
    opacity: 0;
    transition: opacity .4s .7s;
  }
  .card:hover .angle-arc { opacity: 1; }

  /* center point */
  .center-dot {
    fill: var(--green);
    r: 3;
    opacity: 0;
    transition: opacity .4s .6s;
  }
  .card:hover .center-dot { opacity: 1; }

  /* diagonal line */
  .diagonal {
    stroke: var(--red);
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
    opacity: 0;
    transition: opacity .4s .7s;
  }
  .card:hover .diagonal { opacity: 1; }

  /* parallel arrows */
  .parallel-mark {
    stroke: var(--blue);
    stroke-width: 1.8;
    opacity: 0;
    transition: opacity .4s .8s;
  }
  .card:hover .parallel-mark { opacity: 1; }

  /* ─── CARD INFO ─── */
  .card-info {
    padding: 10px 18px 18px;
  }
  .card-info h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-info p {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .formules-preview {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .formule-tag {
    font-size: 0.76rem;
    background: var(--green-l);
    color: var(--green-d);
    border-radius: 8px;
    padding: 3px 10px;
    font-family: 'Courier New', monospace;
    font-weight: 600;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: var(--bg);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background .2s;
  }
  .modal-close:hover { background: #fee2e2; color: var(--red); }

  .modal-svg-large {
    display: flex;
    justify-content: center;
    margin: 14px 0;
  }
  .modal-svg-large svg {
    width: 220px; height: 180px;
    overflow: visible;
  }
  /* modal shape is always drawn */
  .modal .geo-shape {
    animation: drawShape 1.2s ease forwards !important;
    fill: #bbf7d0 !important;
  }
  .modal .dim-label,
  .modal .right-angle,
  .modal .angle-arc,
  .modal .center-dot,
  .modal .diagonal,
  .modal .parallel-mark { opacity: 1 !important; }

  .modal h2 { font-size: 1.3rem; font-weight: 800; color: var(--green-d); }
  .modal .modal-badges { display: flex; gap: 6px; margin: 8px 0 12px; }

  .prop-list { list-style: none; margin: 8px 0 14px; }
  .prop-list li {
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .prop-list li::before { content: '✦'; color: var(--green); font-size: 10px; margin-top: 3px; flex-shrink: 0; }

  .formule-block {
    background: var(--green-l);
    border-left: 4px solid var(--green);
    border-radius: 0 10px 10px 0;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .formule-block .f-type { font-size: 0.7rem; font-weight: 700; color: var(--green); text-transform: uppercase; }
  .formule-block .f-formula {
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--green-d);
    margin: 2px 0;
  }
  .formule-block .f-exemple { font-size: 0.75rem; color: var(--muted); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .main { padding: 16px; grid-template-columns: 1fr 1fr; gap: 14px; }
    header { padding: 14px 16px; }
    header h1 { font-size: 1.1rem; }
    .filters-bar { padding: 10px 16px; }
  }
  @media (max-width: 400px) {
    .main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📐</div>
  <h1>GéoCollège — Figures Animées</h1>
  <span>11 formes · Collège Maroc</span>
</header>

<div class="filters-bar">
  <label>NIVEAU :</label>

  <button class="filter-btn niveau-2ac" onclick="filter('2AC', this)">2AC</button>
  <label style="margin-left:14px">CATÉGORIE :</label>
  <button class="filter-btn" onclick="filter('triangle', this)">Triangles</button>
  <button class="filter-btn" onclick="filter('quadrilatere', this)">Quadrilatères</button>
  <button class="filter-btn" onclick="filter('cercle', this)">Cercles</button>
</div>

<div class="main" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════

function buildSVG(forme, size = 'sm') {
  const w = size === 'lg' ? 220 : 180;
  const h = size === 'lg' ? 180 : 145;
  return `<svg viewBox="0 0 180 155" xmlns="http://www.w3.org/2000/svg"
    width="${w}" height="${h}" overflow="visible">
    ${forme.svg}
  </svg>`;
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  list.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.06}s`;
    card.dataset.niveau = f.niveau;
    card.dataset.cat = f.categorie;
    card.onclick = () => openModal(f);
    card.innerHTML = `
      <div class="card-badge">
        <span class="badge badge-${f.niveau.toLowerCase()}">${f.niveau}</span>
        <span class="badge badge-cat">${f.categorie === 'quadrilatere' ? 'Quadrilatère' : f.categorie === 'triangle' ? 'Triangle' : 'Cercle'}</span>
      </div>
      <div class="svg-area">${buildSVG(f)}</div>
      <div class="card-info">
        <h3>${f.nom}</h3>
        <p>${f.description}</p>
        <div class="formules-preview">
          ${f.formules.slice(0,2).map(fo => `<div class="formule-tag">${fo.formule}</div>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════════

let activeFilter = 'all';

function filter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.card').forEach(c => {
    const match =
      val === 'all' ||
      c.dataset.niveau === val ||
      c.dataset.cat === val;
    c.classList.toggle('hidden', !match);
  });
}

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════

function openModal(f) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-badges">
      <span class="badge badge-${f.niveau.toLowerCase()}">${f.niveau}</span>
      <span class="badge badge-cat">${f.categorie === 'quadrilatere' ? 'Quadrilatère' : f.categorie === 'triangle' ? 'Triangle' : 'Cercle'}</span>
    </div>
    <h2>${f.nom}</h2>
    <p style="color:var(--muted);font-size:.85rem;margin:8px 0">${f.description}</p>

    <div class="modal-svg-large">${buildSVG(f, 'lg')}</div>

    <h4 style="margin:12px 0 6px;color:var(--green-d);font-size:.85rem;text-transform:uppercase;letter-spacing:.05em">Propriétés</h4>
    <ul class="prop-list">
      ${f.proprietes.map(p => `<li>${p}</li>`).join('')}
    </ul>

    <h4 style="margin:12px 0 6px;color:var(--green-d);font-size:.85rem;text-transform:uppercase;letter-spacing:.05em">Formules</h4>
    ${f.formules.map(fo => `
      <div class="formule-block">
        <div class="f-type">${fo.type}</div>
        <div class="f-formula">${fo.formule}</div>
        <div class="f-exemple">Exemple : ${fo.exemple}</div>
      </div>`).join('')}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalBtn();
}

// ═══════════════════════════════════════════════════════
//  INIT

renderCards(FORMES);
