<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GéoCollège — Connexion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --green: #16a34a;
      --green-d: #14532d;
      --green-l: #dcfce7;
      --green-m: #4ade80;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --muted2: #94a3b8;
      --red: #dc2626;
      --red-l: #fef2f2;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 40%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--green-d);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-a {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 99px;
      transition: all .18s;
    }

    .nav-a:hover {
      background: var(--green-l);
      color: var(--green-d);
    }

    .nav-a.active {
      background: var(--green);
      color: #fff;
    }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text);
    }

    /* AUTH CONTAINER */
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      animation: cardSlideUp .4s ease;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--green), var(--green-m));
    }

    @keyframes cardSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* HEADER */
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-icon {
      width: 56px;
      height: 56px;
      background: var(--green-l);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }

    .auth-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--muted);
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
    }

    .form-input {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 13px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }

    .form-input::placeholder {
      color: var(--muted2);
    }

    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, .1);
    }

    .form-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, .08);
    }

    /* BUTTON */
    .btn-submit {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .18s, transform .1s;
      position: relative;
      overflow: hidden;
      margin-top: 6px;
    }

    .btn-submit:hover {
      background: var(--green-d);
    }

    .btn-submit:active {
      transform: scale(.98);
    }

    .btn-submit:disabled {
      background: var(--muted2);
      cursor: not-allowed;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .25);
      transform: scale(0);
      opacity: 1;
      transition: transform .4s, opacity .4s;
      border-radius: inherit;
    }

    .btn-submit:active::after {
      transform: scale(2.5);
      opacity: 0;
    }

    /* ALERT */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      animation: fadeIn .25s ease;
    }

    .alert.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-error {
      background: var(--red-l);
      color: var(--red);
      border: 1px solid #fca5a5;
    }

    .alert-success {
      background: var(--green-l);
      color: var(--green-d);
      border: 1px solid #86efac;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* DIVIDER */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      font-size: 12px;
      color: var(--muted2);
      font-weight: 500;
    }

    /* LINKS */
    .auth-link {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .auth-link a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
      transition: color .15s;
    }

    .auth-link a:hover {
      color: var(--green-d);
    }

    /* PASSWORD TOGGLE */
    .password-wrap {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted2);
      padding: 4px;
      transition: color .15s;
    }

    .password-toggle:hover {
      color: var(--green);
    }

    /* FOOTER */
    footer {
      background: var(--green-d);
      color: #a7f3d0;
      padding: 24px;
      text-align: center;
      font-size: 13px;
    }

    footer strong {
      color: #fff;
      font-family: 'Unbounded', sans-serif;
    }

    /* RESPONSIVE */
    @media(max-width:768px) {
      .nav-links {
        display: none;
      }

      .nav-toggle {
        display: block;
      }

      .nav-links.open {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--surface);
        padding: 12px;
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .auth-card {
        padding: 32px 24px;
      }
    }

    /* SPINNER */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-logo" href="index.html"><span class="dot"></span>GéoCollège</a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="nav-a">Accueil</a>
      <a href="formes.html" class="nav-a">Formes</a>
      <a href="theoremes.html" class="nav-a">Théorèmes</a>
      <a href="exercices.html" class="nav-a">Exercices</a>
      <a href="constructeur.html" class="nav-a">Constructeur</a>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h1 class="auth-title">Connexion</h1>
        <p class="auth-subtitle">Accède à ton espace GéoCollège</p>
      </div>

      <div class="alert alert-error" id="alert-error">
        <span>❌</span>
        <span id="error-text"></span>
      </div>

      <div class="alert alert-success" id="alert-success">
        <span>✅</span>
        <span id="success-text"></span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Adresse email</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="ton.email@exemple.com" required autofocus />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Mot de passe</label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="password" name="password"
              placeholder="••••••••" required />
            <button type="button" class="password-toggle" id="toggle-pwd" aria-label="Afficher le mot de passe">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">Se connecter</button>
      </form>

      <div class="auth-divider"><span>ou</span></div>

      <div class="auth-link">
        Pas encore de compte ? <a href="register.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <footer>
    <strong>GéoCollège</strong> · Projet CRMEF Mathématiques
  </footer>

  <script>
    // ── Password toggle ──
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const isHidden = pwd.type === 'password';
      pwd.type = isHidden ? 'text' : 'password';
      document.getElementById('toggle-pwd').textContent = isHidden ? '🙈' : '👁';
    });

    // ── Form submit ──
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-submit');
      const alertErr = document.getElementById('alert-error');
      const alertOk = document.getElementById('alert-success');

      // Reset
      alertErr.classList.remove('show');
      alertOk.classList.remove('show');
      document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));

      // Validation côté client
      let hasError = false;
      if (!email) {
        document.getElementById('email').classList.add('error');
        hasError = true;
      }
      if (!password) {
        document.getElementById('password').classList.add('error');
        hasError = true;
      }
      if (hasError) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      // Envoyer
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Connexion…';

      try {
        const res = await fetch('api/auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (data.error) {
          showError(data.message);
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          return;
        }

        // Succès
        showSuccess('Bienvenue, ' + data.user.name + ' ! Redirection…');
        btn.textContent = '✓ Connecté !';

        // Stocker en localStorage pour le frontend
        localStorage.setItem('geo_user', JSON.stringify(data.user));

        // Rediriger vers la page d'origine ou l'accueil après 800ms
        setTimeout(() => {
          const redirectUrl = sessionStorage.getItem('geo_redirect_after_login');
          if (redirectUrl) {
            sessionStorage.removeItem('geo_redirect_after_login');
            window.location.href = redirectUrl;
          } else {
            window.location.href = 'index.html';
          }
        }, 800);

      } catch (err) {
        showError('Erreur réseau — vérifie que XAMPP est démarré.');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });

    function showError(msg) {
      const el = document.getElementById('alert-error');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('alert-success');
      document.getElementById('success-text').textContent = msg;
      el.classList.add('show');
    }

    // Si déjà connecté, rediriger
    if (localStorage.getItem('geo_user')) {
      window.location.href = 'index.html';
    }
  </script>

</body>

</html>
